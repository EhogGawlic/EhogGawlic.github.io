<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>totays comick</title>
    <style>
      * {
        font-family: "Courier New", Courier, monospace;
      }
      #headbox {
        position: absolute;
        top: 10px;
        left: calc(50% - 300px);
        right: calc(50% - 300px);
        height: 200px;
        background-color: white;
        border: 1px solid black;
        border-radius: 5px;
      }
      #mainbox {
        position: absolute;
        top: 220px;
        left: calc(50% - 300px);
        right: calc(50% - 300px);
        background-color: white;
        border: 1px solid black;
        text-align: center;
        border-radius: 5px;
        display: inline-block; /* Allows width to grow with content */
        white-space: nowrap;
      }
      #mainbox h2 {
        text-align: center;
      }
      #mainbox img {
        display: inline-block;
        border: 1px solid lightblue;
        width: 580px;
      }
      html {
        background-color: azure;
      }
    </style>
  </head>
  <body>
    <div id="headbox">
      <h1>TOTAYS COMICK</h1>
    </div>
    <div id="mainbox">
      <h2 id="title">Title</h2>
      <div>
        <button onclick="
        if (cn > 1){
          updateQueryParam('c',cn-1)
        }
          ">Previous</button
        ><button onclick="
        if (cn < 2){
          updateQueryParam('c',cn+1)
        }
        ">Next</button>
      </div>
      <img src="./comics/comic1.png" />
    </div>
    <script>
      function updateQueryParam(key, value, replace = false) {
        try {
          // Create a URL object from the current location
          const url = new URL(window.location.href);

          // Update or add the query parameter
          url.searchParams.set(key, value);

          // Update the browser's address bar without reloading
          if (replace) {
            window.history.replaceState({}, "", url);
          } else {
            window.history.pushState({}, "", url);
            window.location.reload()
          }
        } catch (err) {
          console.error("Invalid URL or parameter:", err);
        }
      }
      const url = new URL(window.location.href);
      const params = new URLSearchParams(url.search);
      let cn = parseInt(params.get("c"));
      document.querySelector("img").title = "Title text";
      if (!cn || !params.has("c")) {
        cn = 2;
      }
      (async () => {
        document.querySelector("img").src = "./comics/comic" + cn + ".png";
        const res1 = await fetch("./comics/names/comic" + cn + ".txt");

        const res2 = await fetch("./comics/titletexts/comic" + cn + ".txt");
        if (res1.ok && res2.ok) {
          const txt1 = await res1.text();
          const txt2 = await res2.text();
          title.innerHTML = txt1;
          document.querySelector("img").title = txt2;
        } else {
          console.log(res1.code);
        }
      })();
    </script>
  </body>
</html>
